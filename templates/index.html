<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>賽壬唱片下載器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: #282828;
      --text: #e8e8e8;
      --muted: #6a6a6a;
      --accent: #c8a165;
      --success: #4caf7d;
      --danger: #e05555;
      --radius: 8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(13,13,13,0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .header-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .header-count {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .logout-btn {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      transition: color 0.15s, border-color 0.15s;
    }

    .logout-btn:hover { color: var(--text); border-color: #444; }

    /* ── Loading ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem;
      gap: 1rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Grid ── */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
      padding: 1.5rem 2rem 4rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color 0.15s, transform 0.15s;
    }

    .card:hover { border-color: #3a3a3a; transform: translateY(-2px); }
    .card.open  { border-color: var(--accent); transform: none; }

    /* Cover */
    .cover {
      position: relative;
      aspect-ratio: 1;
      background: #1e1e1e;
      overflow: hidden;
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .cover img.visible { opacity: 1; }

    .shimmer {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #1a1a1a 0%, #252525 50%, #1a1a1a 100%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Info section */
    .info {
      padding: 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .album-name {
      font-size: 0.82rem;
      font-weight: 500;
      line-height: 1.5;
      min-height: 2.5em;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Toggle button */
    .btn {
      width: 100%;
      padding: 0.42rem 0;
      border-radius: 4px;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      letter-spacing: 0.04em;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
    }

    .btn:hover { background: var(--accent); color: #000; }

    .btn .arrow {
      display: inline-block;
      transition: transform 0.2s;
      font-style: normal;
    }

    .card.open .btn .arrow { transform: rotate(180deg); }

    /* ── Song list ── */
    .song-list {
      display: none;
      flex-direction: column;
      gap: 0;
      border-top: 1px solid var(--border);
      margin: 0 -0.75rem -0.75rem;
    }

    .card.open .song-list { display: flex; }

    .dl-all {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.5rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      background: transparent;
      border-left: none;
      border-right: none;
      border-top: none;
      border-radius: 0;
      width: 100%;
      transition: background 0.15s, color 0.15s;
    }

    .dl-all:hover { background: var(--accent); color: #000; }
    .dl-all:disabled { opacity: 0.5; cursor: default; }
    .dl-all:disabled:hover { background: transparent; color: var(--accent); }

    .song-loading {
      padding: 0.75rem;
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .song-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      text-decoration: none;
      color: var(--text);
      font-size: 0.78rem;
      border-top: 1px solid var(--border);
      transition: background 0.1s;
      cursor: pointer;
    }

    .song-row:hover { background: var(--surface2); }

    .song-num {
      flex-shrink: 0;
      width: 1.4rem;
      text-align: right;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .song-name {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dl-icon {
      flex-shrink: 0;
      color: var(--accent);
      font-size: 0.85rem;
      opacity: 0.7;
    }

    .song-row:hover .dl-icon { opacity: 1; }
  </style>
</head>
<body>

<header class="header">
  <h1 class="header-title">賽壬唱片下載器</h1>
  <span class="header-count" id="count"></span>
  <a href="/logout" class="logout-btn">登出</a>
</header>

<div id="loading">
  <div class="spinner"></div>
  <span>取得專輯清單中…</span>
</div>

<div id="grid"></div>

<script>
const grid = document.getElementById('grid');
const loading = document.getElementById('loading');
const countEl = document.getElementById('count');

async function init() {
  try {
    const res = await fetch('/api/albums');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const albums = await res.json();

    loading.style.display = 'none';
    countEl.textContent = `共 ${albums.length} 張專輯`;

    const frag = document.createDocumentFragment();
    albums.forEach(album => frag.appendChild(buildCard(album)));
    grid.appendChild(frag);

    lazyLoadCovers();
  } catch (err) {
    loading.innerHTML = `<span style="color:var(--danger)">載入失敗：${err.message}</span>`;
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildCard(album) {
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.cid = album.cid;
  card.innerHTML = `
    <div class="cover">
      <img data-src="/api/album/${album.cid}/cover" alt="${escHtml(album.name)}">
      <div class="shimmer"></div>
    </div>
    <div class="info">
      <div class="album-name">${escHtml(album.name)}</div>
      <button class="btn toggle-btn">
        歌曲列表 <i class="arrow">▾</i>
      </button>
      <div class="song-list"></div>
    </div>
  `;
  card.querySelector('.toggle-btn').addEventListener('click', () => toggleSongList(card, album.cid));
  return card;
}

function lazyLoadCovers() {
  const io = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      img.src = img.dataset.src;
      img.onload = () => {
        img.classList.add('visible');
        const shimmer = img.nextElementSibling;
        if (shimmer) shimmer.remove();
      };
      img.onerror = () => {
        const shimmer = img.nextElementSibling;
        if (shimmer) shimmer.remove();
      };
      io.unobserve(img);
    });
  }, { rootMargin: '300px' });

  document.querySelectorAll('.cover img[data-src]').forEach(img => io.observe(img));
}

async function toggleSongList(card, cid) {
  const isOpen = card.classList.contains('open');
  if (isOpen) {
    card.classList.remove('open');
    return;
  }

  card.classList.add('open');

  const songList = card.querySelector('.song-list');

  // Already loaded
  if (songList.dataset.loaded) return;

  songList.innerHTML = '<div class="song-loading">載入中…</div>';

  try {
    const res = await fetch(`/api/album/${cid}/songs`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const songs = await res.json();

    songList.dataset.loaded = '1';
    songList.innerHTML = '';

    // "全部下載" button
    const dlAllBtn = document.createElement('button');
    dlAllBtn.className = 'dl-all';
    dlAllBtn.innerHTML = '⬇ 全部下載';
    dlAllBtn.addEventListener('click', () => downloadAll(songs, dlAllBtn));
    songList.appendChild(dlAllBtn);

    // Individual song rows
    songs.forEach((song, i) => {
      const row = document.createElement('a');
      row.className = 'song-row';
      row.href = `/api/song/${song.cid}/download`;
      row.innerHTML = `
        <span class="song-num">${i + 1}.</span>
        <span class="song-name">${escHtml(song.name)}</span>
        <span class="dl-icon">⬇</span>
      `;
      songList.appendChild(row);
    });

  } catch (err) {
    songList.innerHTML = `<div class="song-loading" style="color:var(--danger)">載入失敗：${err.message}</div>`;
  }
}

async function downloadAll(songs, btn) {
  btn.disabled = true;

  for (let i = 0; i < songs.length; i++) {
    btn.textContent = `⬇ 下載中 (${i + 1}/${songs.length})`;

    const a = document.createElement('a');
    a.href = `/api/song/${songs[i].cid}/download`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);

    await new Promise(r => setTimeout(r, 1500));
  }

  btn.textContent = `✓ 已觸發全部下載`;
  btn.disabled = false;
}

init();
</script>
</body>
</html>
